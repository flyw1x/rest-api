services:
  db:
    image: postgres:15-alpine
    container_name: library_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    image: python:3.11-slim
    container_name: library_api_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      DATABASE_URL: "postgresql+asyncpg://user:password@db:5432/library"
    # Оця команда примусово оновить pip, поставить УСІ бібліотеки і запустить додаток!
    command: >
      sh -c "pip install --upgrade pip && 
             pip install fastapi uvicorn pydantic sqlalchemy asyncpg httpx pytest pytest-asyncio && 
             python -m uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - db

volumes:
  postgres_data: